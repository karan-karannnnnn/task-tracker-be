version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: employee_tracker_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-uroot",
          "-p${DB_PASSWORD}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app_network

  app:
    build:
      context: .
      target: production
    container_name: employee_tracker_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      - db
    networks:
      - app_network
    command: >
      sh -c "npx prisma migrate deploy && node src/app.js"

networks:
  app_network:
    driver: bridge

volumes:
  mysql_data: