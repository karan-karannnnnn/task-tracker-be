version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: employee_tracker_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-employee_tracker}
      MYSQL_USER: ${MYSQL_USER:-appuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-apppassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app_network

  app:
    build:
      context: .
      target: production
    container_name: employee_tracker_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-appuser}:${MYSQL_PASSWORD:-apppassword}@db:3306/${MYSQL_DATABASE:-employee_tracker}
      NODE_ENV: production
      PORT: 3000
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network
    command: >
      sh -c "npx prisma migrate deploy && node src/app.js"

networks:
  app_network:
    driver: bridge

volumes:
  mysql_data:
